name: PR Title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  conventional-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Checking PR title: $PR_TITLE"
          if ! echo "$PR_TITLE" | grep -Eq '^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([^)]+\))?!?: .+'; then
            echo "PR title must use Conventional Commits: <type>(<scope>)?: <description>."
            echo "Allowed types: build, chore, ci, docs, feat, fix, perf, refactor, revert, style, test."
            echo "Examples: feat: add contact form, fix(auth): handle expired session."
            exit 1
          fi
